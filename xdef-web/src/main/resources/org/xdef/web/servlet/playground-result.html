<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground result &mdash; ${status}</title>
    <meta name="description" content="Playground result &mdash; ${status}"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="image/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="style/common.css"/>
    <script type="module" src="style/common.js"></script>
</head>
<body>

<div id="header"><span class="error">ERROR: HEADER NOT LOADED</span></div>

<h1>Playground result &mdash; ${status}</h1>

<h2>${result-title}</h2>
<pre class="output">${result}</pre>
<div class="output">${stdout}</div>

<div id="footer"><span class="error">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">loadHeaderFooter(
    function() { $(this).children("div").append(", X-definition: ${xdef-lib-id}"); })
</script>

</body>
</html>
