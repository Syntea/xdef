<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground result &mdash; ${status}</title>
    <meta name="description" content="Playground result &mdash; ${status}"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="image/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="style/common.css"/>
    <script type="module" src="style/common.js"></script>
</head>
<body>

<div id="header"><span class="error">ERROR: HEADER NOT LOADED</span></div>


<h1>Playground result &mdash; ${status}</h1>

<h2>${result-title}</h2>
<pre class="output">${result}</pre>

<div style="display: ((html-div))">
<h2>Display as HTML</h2>
<div class="output resizable">
<iframe srcdoc="${result-html}">Your browser does not support iframes</iframe>
</div>
</div>

<h2>Output stream (System.out)</h2>
<pre style="display: ((stdout-div))" class="output">${stdout}</pre>
<div style="display: ((stdout-none))">None.</div>


<div id="footer"><span class="error">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasic(
    function() { $(this).children("div").append("<span>, X-definition: ${xdef-lib-id}</span>"); })
</script>

</body>
</html>
