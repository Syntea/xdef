<!DOCTYPE HTML><html lang="en">
  <head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>X-definition - INI/Properties</title>
    <meta name="description" content="X-definition: Windows INI, Properties">
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico">
    <link rel="stylesheet" type="text/css" href="../style/common.css">
    <script type="module" src="../style/common.js"></script>
  </head>
  <body>
    <div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


    <div class="title">X-definition - INI/Properties</div>

    
    <form method="post" action="../playground/Playground">
      <b>X-definition:</b>
      
        
        <textarea name="xdef" rows="15" class="lined">
&lt;xd:def xmlns:xd="http://www.xdef.org/xdef/4.2" name="Example" root="test"&gt;
  &lt;xd:ini name="test"&gt;
    TRSUser = string(); finally outln("User: " + getText());
    [User]
      Home = file(); finally outln("Home directory: " + getText());
      Authority = enum("MANAGER", "CLIENT", "UNREGISTRED"); finally outln("authority: " + getText());
      ReceiverSleep = optional int(1, 3600); /* default value is 10 */
    [Server] %script = optional
      RemoteServerURL = url()
      SeverIP = ipAddr()
      Signature = SHA1()
  &lt;/xd:ini&gt;
&lt;/xd:def&gt;
</textarea>
      
      <b>Input data:</b>
      
        
        <textarea name="data" rows="13" class="lined">
############# TRS configuration #############
# TRS user name
TRSUser = John Smith
[User]
Home = D:/TRS_Client/usr/Smith
# authority(SECURITY | SOFTWARE | CLIENT | UNREGISTRED)
Authority=CLIENT
[Server]
RemoteServerURL=http://localhost:8080/TRS/TRSServer
SeverIP = 123.45.67.8
Signature = 12afe0c1d246895a990ab2dd13ce684f012b339c
</textarea>
              
      <input type="hidden" name="ini" value="ini">
      <button type="submit">Validate</button>
      <i>&nbsp;You can edit both <b>X-definition:</b> and/or <b>Input data:</b></i>
    </form>
  

    <div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

    <script type="module">initPageBasicLined()</script>
  </body>
</html>
