<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">X-lexicon German version</div>

<form method="post" action="../playground/Playground">

<p>
Usage of X-lexicon in the X-definition, input data in the German version.
You can also try the French version <a href="ch05s01e01.html"><b>HERE</b></a>.
</p>

<b>X-definition:</b>
<textarea name="xdef" rows="26" class="lined">
&lt;xd:def xmlns:xd = "http://www.xdef.org/xdef/4.2" xd:name = "Test" xd:root = "Book"&gt;
  &lt;Book ISBN="int(10000000, 999999999);"
      year = "gYear();"
      title = "string();"
  &gt;
      &lt;Author xd:script="occurs *"&gt; string(); &lt;/Author&gt;
  &lt;/Book&gt;

  /* All items in the model are in English version */
  &lt;xd:lexicon language='eng' default='yes'/&gt;
  &lt;xd:lexicon language='deu'&gt; 
      Test#Book =         Buch
      Test#Book/@year =   Jahr
      Test#Book/@title =  Buchtitel
      Test#Book/Author =  Autor
  &lt;/xd:lexicon&gt;
  &lt;xd:lexicon language='fra'&gt;
      Test#Book =         Livre
      Test#Book/@year =   année
      Test#Book/@title =  titre
      Test#Book/Author =  Auteur
  &lt;/xd:lexicon&gt;
&lt;/xd:def&gt;
</textarea>

<b>Input data:</b>
<input name="langInp" value="deu" type="hidden">
<textarea name="data" rows="10" class="lined">
&lt;Buch ISBN = "123456789"
      Jahr = "1992"
      Buchtitel = "Snow Crash"
&gt;
  &lt;Autor&gt;Neal Stephenson&lt;/Autor&gt;
&lt;/Buch&gt;
</textarea>

Output language:
<input name="langOut" value="" type="text">
(<b>""</b>, <b>"eng"</b>, <b>"deu"</b> or <b>"fra"</b>)<br>
<button type="submit">Validate</button>

</form>
