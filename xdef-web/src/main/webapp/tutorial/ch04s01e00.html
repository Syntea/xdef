<!DOCTYPE HTML><html lang="en">
  <head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>X-definition - JSON</title>
    <meta name="description" content="X-definition: example of JSON">
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico">
    <link rel="stylesheet" type="text/css" href="../style/common.css">
    <script type="module" src="../style/common.js"></script>
  </head>
  <body>
    <div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>

    <div class="title">X-definition - JSON</div>

    <form method="post" action="../playground/Playground">
      
      <b>X-definition:</b>
      <textarea name="xdef" rows="16" class="linenumbers">
&lt;xd:def xmlns:xd="http://www.xdef.org/xdef/4.2" name="Test" root="Distancies"&gt;
  &lt;xd:json name="Distancies"&gt;
    { "cities": [
        { %script: "occurs 1..*;",
          "from": [ "string();",
            { %script: "occurs 1..*;",
              "to": "jstring();", "distance": "int();"
            }
          ]
        }
      ]
    }
  &lt;/xd:json&gt;
&lt;/xd:def&gt;
</textarea>

      <b>Input JSON data:</b>
      <input name="dataFormat" value="json" type="hidden"/>
      <textarea name="data" rows="15" class="linenumbers">
{ "cities" : [
    { "from": ["Brussels",
        {"to": "London", "distance": 322},
        {"to": "Paris",  "distance": 265}
      ]
    },
    { "from": ["London",
        {"to": "Brussels", "distance": 322},
        {"to": "Paris",    "distance": 344}
      ]
    }
  ]
}
</textarea>
      <input name="xonDisplayAs" value="json xon yaml xml" type="hidden"/>
      <button type="submit">Validate</button> and display also as XON, YAML, XON-XML.
    </form>

    <div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

    <script type="module">initPageBasicLnums()</script>
  </body>
</html>
