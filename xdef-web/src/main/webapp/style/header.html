<div class="header">
    <div class="logo"><a href="${rootPath}./"><img src="${rootPath}image/logo.png"/></a></div>
    <div class="lang" title="Language selection">
        <span id="headLangPas" onclick="headLangActivate()">Lang: EN</span>
        <select id="headLangAct" onchange="location = this.value;">
            <option value="${rootPath}./"  title="english" lang="en" selected="selected">english</option>
            <option value="${rootPath}cs/" title="czech"   lang="cs"                    >česky</option>
        </select>
    </div>
    <ul class="nav">
        <li class="logo"><span></span></li>
        <li><span><a href="${rootPath}tutorial/"                    >Tutorial</a></span></li>
        <li><span><a href="${rootPath}playground/"                  >Playground</a></span></li>
        <li><span><a href="${rootPath}other/download.html"          >Download</a></span></li>
        <li><span><a href="${rootPath}./#Media"                     >Media</a></span></li>
        <li><span><a href="https://www.syntea.cz/o-nas/"            >Syntea</a></span></li>
    </ul>
    <script>
        $("div.logo").hover(
    		function(){ $("img").animate({height: '8em'}, "fast"); },
            function(){ $("img").animate({height: '4em'}, "fast"); }
		)
    </script>
</div>
