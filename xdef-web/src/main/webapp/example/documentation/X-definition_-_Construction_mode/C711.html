      <b>X-definition:</b><br>
      
         
        <textarea name="xdef" rows="24" class="lined">
&lt;xd:def xmlns:xd='http://www.xdef.org/xdef/4.2' xmlns='http://www.w3.org/1999/xhtml'&gt;
  &lt;html xd:script='template'&gt;
    &lt;head&gt;
      &lt;title&gt; British monarchs &lt;/title&gt;
    &lt;/head&gt;
    &lt;body&gt;
      &lt;h2&gt; British monarchs: &lt;/h2&gt;
      &lt;table border="create 'border'"&gt;
        &lt;tr bgcolor="C0C0C0" xd:script='template'&gt;
          &lt;td&gt;Monarch&lt;/td&gt;
          &lt;td&gt;Reigned from&lt;/td&gt;
          &lt;td&gt;Reigned to&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr xd:script='*; create from("//monarch").sort("reigned/start/text()")'&gt;
          &lt;td bgcolor="fixed 'violet'"&gt;create from('name/text()')&lt;/td&gt;
          &lt;td bgcolor="fixed 'yellow'"&gt;create from('reigned/start/text()')&lt;/td&gt;
          &lt;td bgcolor="fixed 'lightgrey'"&gt;optional string(); create from('reigned/end/text()')&lt;/td&gt;
        &lt;/tr&gt;
      &lt;/table&gt;
    &lt;/body&gt;
   &lt;/html&gt;
&lt;/xd:def&gt;
</textarea><br>
