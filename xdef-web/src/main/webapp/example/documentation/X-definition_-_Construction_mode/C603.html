<!DOCTYPE HTML><html lang="en">
  <head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>X-definition — Construction mode</title>
    <meta name="description" content="">
    <link rel="icon" type="image/x-icon" href="../../../style/favicon.ico">
    <link rel="stylesheet" type="text/css" href="../../../style/common.css">
    <script type="module" src="../../../style/common.js"></script>
  </head>
  <body>
    <div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>

    <div class="title">X-definition — Construction mode</div>

    <form method="post" action="../../../playground/Playground">
      <b>X-definition:</b>
      <textarea name="xdef" rows="26" class="linenumbers">
&lt;xd:def xmlns:xd = "http://www.xdef.org/xdef/4.2" root = "Weather"&gt;
&lt;xd:declaration&gt;
  float sum = 0; int num = 0;
&lt;/xd:declaration&gt;

&lt;Weather xd:script="finally returnElement(xcreate('html'))"
   date = "optional date()"&gt;
   &lt;Measurement xd:script = "occurs +"
       wind = "required float(0, 150)"
       temperature = "required float(-40,60); /*limits of temperature*/
                      onTrue {num++; sum += parseFloat(getText());}"
       time = "required time()" /&gt;
&lt;/Weather&gt;

&lt;html&gt;
  string; create "Weather on " + from("@date");
  &lt;li xd:script = "occurs +; create from('Measurement')"&gt;
    string; create "Time: " + from("@time") + ", wind: " + from("@wind") +
                   ", temperature: " + from("@temperature");
  &lt;/li&gt;
  &lt;h3 style="fixed 'background: yellow'"&gt;
    string; create num==0 ? "No data" : format("Average temperature: %2.1f", sum/num);
  &lt;/h3&gt;
&lt;/html&gt;
&lt;/xd:def&gt;
</textarea>

      <b>Input data:</b>
      <textarea name="data" rows="7" class="linenumbers">
&lt;Weather date = "2005-05-11" &gt;
   &lt;Measurement wind = "5.3" temperature = "13.0" time = "05:00:00" /&gt;
   &lt;Measurement wind = "7.2" temperature = "15.2" time = "11:00:00" /&gt;
   &lt;Measurement wind = "8.7" temperature = "18.1" time = "15:00:00" /&gt;
   &lt;Measurement wind = "3.9" temperature = "16.5" time = "20:00:00" /&gt;
&lt;/Weather&gt;
</textarea>

      <button name="mode" value="compose" type="submit">Compose</button>
    </form>

    <div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

    <script type="module">initPageBasicLnums()</script>
  </body>
</html>
