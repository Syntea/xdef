<!DOCTYPE HTML><html lang="en">
  <head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>X-definition — Construction mode</title>
    <meta name="description" content="">
    <link rel="icon" type="image/x-icon" href="../../../style/favicon.ico">
    <link rel="stylesheet" type="text/css" href="../../../style/common.css">
    <script type="module" src="../../../style/common.js"></script>
  </head>
  <body>
    <div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>

    <div class="title">X-definition — Construction mode</div>

    
    <form method="post" action="../../../playground/Playground">
      <input type="hidden" name="xdname" value="">
      <b>X-definition:</b><br>
      
         
        <textarea name="xdef" rows="25" class="lined">
&lt;xd:def xmlns:xd = "http://www.xdef.org/xdef/4.2" root = "Item"&gt;

&lt;Contract date = "required dateTime(); create now()"
    number = "required num(10); create from('@id')" &gt;
  &lt;Owner xd:script = "create from('Client[@role=\'1\']')"
      cId   = "required num(8)"
      company = "required string(1,30)" /&gt;
  &lt;Holder xd:script = "create from('Client[@role=\'2\']')"
      pId       = "required string(10,11) "
      name      = "required string(1,30)"
      surname   = "required string(1,30)" /&gt;
  &lt;Policyholder xd:script = "create from('Client[@role=\'3\']')"
      company = "required string(1,30); create from('@name') + ' ' + from('@surname')"
      cId   = "required num(8)" /&gt;
&lt;/Contract&gt;

&lt;Item xd:script='finally returnElement(xcreate("Contract"))' 
    id='num(10)' &gt;
  &lt;Client role = 'int()' company = 'string()' cId = 'num(8)' /&gt;
  &lt;Client role = 'int()' name = 'string()' surname = 'string()' pId = 'string()' /&gt;
  &lt;Client role = 'int()' name = 'string()' surname ='string()' pId = 'string()' cId = 'string()' /&gt;
&lt;/Item&gt;

&lt;/xd:def&gt;</textarea>
      
      <b>Input data:</b>
      
         
        <textarea name="data" rows="6" class="lined">
&lt;Item id='1234567890'&gt;
  &lt;Client role = '1' company = 'SomeCompany Ltd' cId = '12345678' /&gt;
  &lt;Client role = '2' name = 'Peter' surname = 'Brown' pId = '491112/010' /&gt;
  &lt;Client role = '3' name = 'John' surname = 'Smith' pId ='491112/010' cId = '12345678' /&gt;
&lt;/Item&gt;</textarea>
      
      <button type="submit">Validate</button>
      
    </form>
  

    <div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

    <script type="module">initPageBasicLined()</script>
  </body>
</html>
