<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground &mdash; create XML schema from X-definition</title>
    <meta name="description" content="Playground &mdash; create XML schema from X-definition"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">Playground &mdash; create XML schema from X-definition</div>

<form method="post" action="../GenSchema">

<b>X-definition:</b><br/>
Name of root X-definition: <input name="xdName" value="" type="text"/>
(enter in case of X-definition collection)
<textarea name="xdef" rows="25" class="lined">
&lt;xd:def xmlns:xd="http://www.xdef.org/xdef/4.2" name="Example" root="Town">

  &lt;xd:declaration>
    type NAME string(1, 100);
    type NUM int(1, 99999);
  &lt;/xd:declaration>

  &lt;Town Name="NAME;">
    &lt;xd:choice>
      &lt;Street xd:script="occurs *;"
              Name="required NAME;">
         &lt;House xd:script="occurs *; ref House" />
      &lt;/Street>
      &lt;House xd:script="occurs *; ref House" />
    &lt;/xd:choice>
  &lt;/Town>

  &lt;House Num="required NUM;">
     &lt;Person xd:script="occurs *;"
             FirstName="required NAME;"
             LastName="required NAME;"/>
  &lt;/House>

&lt;/xd:def>
</textarea>

<b>Input data:</b>
<textarea name="data" rows="10" class="lined">
&lt;Town Name="New town">
  &lt;Street Name="Short">
    &lt;House Num="1">
      &lt;Person FirstName="John" LastName="Smith"/>
  &lt;/House>
  &lt;/Street>
&lt;/Town>
</textarea>

<input name="schema" value="toSchema" type="hidden"/>
<input name="view" value="Generate XML schema" type="submit"/>
<input name="view" value="Check XML data with X-definition" type="submit"/>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicLined();</script>

</body>
</html>
