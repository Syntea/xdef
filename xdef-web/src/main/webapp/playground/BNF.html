<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground &mdash; BNF grammar with X-definition</title>
    <meta name="description" content="Playground &mdash; BNF grammar with X-definition"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">Playground &mdash; BNF grammar with X-definition</div>

<form method="post" action="../Playground">

<b>X-definition:</b><br/>
Name of root X-definition: <input name="xdefRoot" value="" type="text"/>
(enter in case of X-definition collection)
<textarea name="xdef" rows="26" class="lined">
&lt;xd:def xmlns:xd="http://www.xdef.org/xdef/4.2" name="Example" root="root" >
  &lt;xd:BNFGrammar name = "base">
    S ::= [#9#10#13 ]+ /* white spaces */
    sign ::= [-+] /* sign or unary operator */
    number ::= [0-9]+ ("." [0-9]+)? (("E"|"e") (sign)? [0-9]+)?
    identifier ::= [a-zA-Z] [a-zA-Z0-9]*
  &lt;/xd:BNFGrammar>

  &lt;xd:BNFGrammar name = "expr" extends = "base">
    value ::= (sign S?)? (number | identifier | "(" S? expression S? ")")
    term ::= value (S? [*|/%] S? term)?
    expression ::= term (S? [-+] S? expression)?
    assignment ::= identifier S? "=" S? expression /* assignment statement */
  &lt;/xd:BNFGrammar>

  &lt;xd:declaration>
     type assignment expr.rule("assignment");
  &lt;/xd:declaration>

  &lt;root>
    assignment;
  &lt;/root>
&lt;/xd:def>
</textarea>

<b>Input data:</b>
<textarea name="data" rows="5" class="lined">
&lt;root>
  x = - abc + 3.14159 * - ( 2.3 - 3e-2 ) / 2 * 10e5
&lt;/root>
</textarea>

<button type="submit">Validate</button>

</form>
