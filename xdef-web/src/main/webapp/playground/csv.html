<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground — X-definition CSV data validation</title>
    <meta name="description" content="Playground — X-definition CSV data validation"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">Playground — X-definition CSV data validation</div>

<form method="post" action="Playground">

<div>
<b>X-definition:</b>
</div><div>
Name of root X-definition: <input name="xdefRoot" value="" type="text"/>
(enter in case of X-definition collection)
</div>
<textarea name="xdef" rows="21" class="linenumbers">
&lt;xd:def xmlns:xd = "http://www.xdef.org/xdef/4.2" name = "Example" root = "test">
  &lt;xd:json name = "test">
    [
      # header line:
      ["occurs 3..3 string();"],
      # CSV lines:
      [ %script = "*",
        "? string()", "? emailAddr", "? telephone()"
      ]
    ]
  &lt;/xd:json>
&lt;/xd:def>
</textarea>

<b>Input CSV data:</b>
<input name="dataFormat" value="csv" type="hidden"/>
<textarea name="data" rows="14" class="linenumbers">
Name, Email Address, Mobile Number
John Smith, john.smith@smith.com, +1 2345 67 89 01
, nobody@somewhere.org, +89 987 654 321
Somebody, ,
, , 98765412
</textarea>

<div>
Process csv-header line:
<select name="csvHeader">
    <option value="yes">yes</option>
    <option value="no" >no</option>
</select>
</div><div>
Display also as: <input name="xonDisplayAs" value="json xon yaml xml" type="text"/>
(subset of json, xon, yaml, xml, csv, ini)
</div><div>
<button type="submit">Validate</button>
</div>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicLnums();</script>

</body>
</html>
