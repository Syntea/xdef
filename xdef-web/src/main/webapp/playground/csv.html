<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground &mdash; X-definition CSV data validation</title>
    <meta name="description" content="Playground &mdash; X-definition CSV data validation"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<h1>Playground &mdash; X-definition CSV data validation</h1>

<form method="post" action="../Playground">

<b>X-definition:</b><br/>
Name of root X-definition: <input name="xdname" value="" type="text"/>
(enter if you have a collection with more X-definitions)
<textarea name="xdef" rows="21" class="lined">
&lt;xd:def xmlns:xd = "http://www.xdef.org/xdef/4.2" name = "Example" root = "test">
  &lt;xd:json name = "test">
    [
      # header line:
      ["occurs 3..3 string();"],
      # CSV lines:
      [ %script="*",
        "? string()", "? emailAddr", "? telephone()"
      ]
    ]
  &lt;/xd:json>
&lt;/xd:def>
</textarea>

<b>CSV input data:</b>
<input type="hidden" name="input" value="csv"/>
<textarea name="data" rows="14" class="lined">
Name, Email Address, Mobile Number
John Smith, john.smith@smith.com, +1 2345 67 89 01
, nobody@somewhere.org, +89 987 654 321
Somebody, ,
, , 98765412
</textarea>

Export also CSV-header line:
<select name="csvHeaderExport">
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select><br/>
<input name="xonDisplayAs" value="json yaml xon xml" type="hidden"/>
Display also as JSON, YAML, XON, CSV-XML.<br/>
<button type="submit">Validate</button>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicTal();</script>

</body>
</html>
