<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground &mdash; X-definition compose mode</title>
    <meta name="description" content="Playground &mdash; X-definition compose mode (data construction or transformation)"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">Playground &mdash; X-definition compose mode</div>

<p>
X-definition compose mode &mdash; data construction or transformation.
</p>

<form method="post" action="../Playground">

<b>X-definition:</b><br/>
Name of root X-definition: <input name="rootName" value="" type="text"/>
(enter in case of X-definition collection)
<textarea name="xdef" rows="24" class="lined">
&lt;xd:def xmlns:xd="http://www.xdef.org/xdef/4.2" name="Example" root="html">
  &lt;html>
    &lt;head>&lt;title> create "Generated today message"; &lt;/title>&lt;/head>
    &lt;body>
      &lt;h1>
        &lt;font color="string(); create 'red'">
          string(); create "Hello! Today is " + now().toString("EEEE, d. MMMM GG yyyy, hh:mm a.");
        &lt;/font> 
      &lt;/h1>
      &lt;h2>
        &lt;font color="string(); create 'blue'">
          &lt;i>string(); create "This is an example of compose mode.";&lt;/i>
        &lt;/font> 
      &lt;/h2>
      &lt;h5 xd:script="*; create from('//i');">
        &lt;font color="string(); create 'green'">
          string(); create from("@x");
        &lt;/font>
      &lt;/h5>
    &lt;/body>
  &lt;/html>
&lt;/xd:def>
</textarea>

<b>Input data:</b><br/>
The model name <input name="modelName" value="" type="text"/>
and namespace: <input name="modelURI" value="" type="text"/>
(optionally)
<textarea name="data" rows="10" class="lined">
&lt;x>
  &lt;i x='Hello'/>
  &lt;i x='world!'/>
&lt;/x>
</textarea>

<button name="mode" value="compose" type="submit">Compose</button>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicLined();</script>

</body>
</html>
