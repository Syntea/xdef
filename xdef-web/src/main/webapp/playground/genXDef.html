<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground &mdash; create X-definition from data</title>
    <meta name="description" content="Playground &mdash; create X-definition from data (XML, JSON, XON, YAML)"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">Playground &mdash; create X-definition from data</div>

<form method="post" action="GenXdef">

<b>Data</b> (XML, JSON, XON, YAML) from which the X-definition will be created:
<textarea name="data" rows="20" class="lined">
&lt;Contract Number = "0123456789" date = "2011-12-13" signature = "1FAA34B01165EFC0D0110FAB34D09865FFC0D074">
  &lt;Client Type = "A"
    CompanyName  = "Company LTD"
    ID           = "012345678"
    email        = "info@company.com" />
  &lt;Client Type = "B"
    GivenName  = "John"
    LastName   = "Smith"
    IPAddr     = "123.01.01.01"
    PersonalID = "111050/1234" />
  &lt;Client Type = "C"
    GivenName  = "George"
    LastName   = "White"
    IPAddr     = "123.01.01.02"
    PersonalID = "311271/2365"
    ID         = "87654321" />
  &lt;Description> Lorem ipsum dolor sit amet, consectetuer adipiscing elit. &lt;/Description>
&lt;/Contract>
</textarea>

<button name="genXdef" value="Create X-definition" type="submit">Create X-definition</button>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicLined();</script>

</body>
</html>
