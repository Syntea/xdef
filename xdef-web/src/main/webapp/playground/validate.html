<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground &mdash; X-definition validation mode</title>
    <meta name="description" content="Online validation and processing of XML data with X-definition"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">Playground &mdash; X-definition validation mode</div>

<form method="post" action="Playground">

<b>X-definition:</b><br/>
Name of root X-definition: <input name="xdefRoot" value="" type="text"/>
(enter in case of X-definition collection)
<textarea name="xdef" rows="10" class="lined">
&lt;xd:def xmlns:xd="http://www.xdef.org/xdef/4.2" name="Example" root="root" >
  &lt;root a="int(); onTrue outln('root a: ' + getText());" >
    &lt;b xd:script="occurs *" >
      optional string(); finally outln("b: " + getText());
    &lt;/b>
  &lt;/root>
&lt;/xd:def>
</textarea>

<b>Input data:</b>
<textarea name="data" rows="10" class="lined">
&lt;root a="123" >
  &lt;b>Lorem ipsum dolor sit amet.&lt;/b>
  &lt;b/>
&lt;/root>
</textarea>

<button type="submit">Validate</button>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicLined();</script>

</body>
</html>
