<!DOCTYPE html>
<html lang="en">
<head>
    <title>X-definition validation mode</title>
    <meta name="description" content="Online validation and processing of XML data with X-definition"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../image/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="text/javascript" src="../style/jquery-4.0.0.min.js"></script>
    <style>.A{min-height:22rem; max-height:22rem; display:flex; overflow:hidden;}</style>    
    <style>.B{min-height:13rem; max-height:13rem; display:flex; overflow:hidden;}</style>
    <script type="text/javascript" src="../style/lineNumbers.js"></script>
    <script type="text/javascript" src="../style/lineNumbers_1.js"></script>
</head>
<body>

<div id="header">ERROR: HEADER NOT LOADED</div>
<script>$("#header").load("../header1.html")</script>


<h1>Playground &mdash; X-definition validation mode</h1>

<form method="post" action="../Example">
    <b>X-definition</b>
    <i>If you have a collection with more X-definitions enter the name of X-definition with root XML data:</i>
    <input name="xdname" value="" type="text"/>
    <div class="A">
        <div id="line-numbers"></div>
        <textarea id="textarea" style="width: 100%;" name="xdef">
&lt;xd:def xmlns:xd="http://www.xdef.org/xdef/4.2" name="Example" root="root" >
  &lt;root a="int(); onTrue outln('root a: ' + getText());" >
    &lt;b xd:script="occurs *" >
      optional string(); finally outln("b: " + getText());
    &lt;/b>
  &lt;/root>
&lt;/xd:def>
</textarea>
    </div>
    <b>Input data</b>
    <div class="B">
        <div id="line-numbers_1"></div>
        <textarea id="textarea_1" style="width:100%;" name="data">
&lt;root a="123" >
  &lt;b>Lorem ipsum dolor sit amet.&lt;/b>
  &lt;b/>
&lt;/root>
</textarea>
    </div>
    <input name="submit" value="Execute" type="submit"/>
    <i>You can edit <b>X-definition</b> or <b>Input</b> window</i>
</form>


<div id="footer">ERROR: FOOTER NOT LOADED</div>
<script>$("#footer").load("../footer.html")</script>

</body>
</html>
