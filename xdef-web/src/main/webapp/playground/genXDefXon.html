<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground — Generate X-definition from XON-like data</title>
    <meta name="description" content="Playground — Generate X-definition from XON-like data (XML, JSON, XON, YAML)"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">Playground — Generate X-definition from XON-like data</div>

<form method="post" action="GenXdef">

<b>Data</b> (XML, JSON, XON, YAML) from which the X-definition will be generated:
<textarea name="data" rows="20" class="linenumbers">
{ Contract: 123456789,
  Date: d2011-12-13,
  Description: "Lorem ipsum dolor sit amet.",
  Clients: [
    { Type: c"A",
      Name: "Company LTD",
      ID: "12345678"
    },
    { Type: c"B",
      Name: "John Smith",
      email: e"info@company.com",
      ID: "111050/1234"
    },
    { Type: c"C",
      Name: "George White",
      ID: "87654321"
    }
  ],
}
</textarea>

<button name="genXdef" value="Create X-definition" type="submit">Create X-definition</button>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicLnums();</script>

</body>
</html>
