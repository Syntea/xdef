<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playground &mdash; X-definition INI or Properties data</title>
    <meta name="description" content="Playground &mdash; X-definition INI or Properties data"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">Playground &mdash; X-definition INI or Properties data</div>

<form method="post" action="Playground">

<b>X-definition:</b><br/>
Name of root X-definition: <input name="xdefRoot" value="" type="text"/>
(enter in case of X-definition collection)
<textarea name="xdef" rows="21" class="lined">
&lt;xd:def xmlns:xd="http://www.xdef.org/xdef/4.2" name="Example" root="test">

  &lt;xd:ini name="test">
TRSUser = string(); finally outln("TRS user: " + getText());
[User]
  Home = file(); finally outln("Home directory: " + getText());
  Authority = enum("MANAGER","CLIENT","UNREGISTRED"); finally outln("Authority: " + getText());
  ReceiverSleep = int(1, 3600)
[Server]
  RemoteServerURL = url()
  SeverIP = ipAddr()
  SendMailHost = domainAddr()
  MailAddr = emailAddr()
  Signature = SHA1()
  &lt;/xd:ini>

&lt;/xd:def>
</textarea>

<b>INI input data:</b>
<input name="dataFormat" value="ini" type="hidden"/>
<textarea name="data" rows="19" class="lined">
############# TRS configuration #############
# TRS user name
TRSUser = John Smith
[User]
Home = D:/TRS_Client/usr/Smith
# authority(SECURITY | SOFTWARE | CLIENT | UNREGISTRED)
Authority = CLIENT
ReceiverSleep = 1
[Server]
RemoteServerURL = http://localhost:8080/TRS/TRSServer
SeverIP = 123.45.67.8
SendMailHost = smtp.synth.cz
MailAddr = jira@synth.cz
Signature = 12afe0c1d246895a990ab2dd13ce684f012b339c
</textarea>

Display also as: <input name="xonDisplayAs" value="json xon yaml xml" type="text"/>
(subset of json, xon, yaml, xml, csv, ini)<br/>
<button type="submit">Validate</button>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicLined();</script>

</body>
</html>
