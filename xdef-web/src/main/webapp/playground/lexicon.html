<!DOCTYPE html>
<html lang="en">
<head>
    <title>X-definition with X-lexicon</title>
    <meta name="description" content="X-definition with X-lexicon"/>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="../style/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="../style/common.css"/>
    <script type="module" src="../style/common.js"></script>
</head>
<body>

<div id="header"><span class="errorVD">ERROR: HEADER NOT LOADED</span></div>


<div class="title">X-definition with X-lexicon</div>

<form method="post" action="Playground">

<div>
<b>X-definition:</b>
</div><div>
Name of root X-definition: <input name="xdefRoot" value="" type="text"/>
(enter in case of X-definition collection)
</div>
<textarea name="xdef" rows="26" class="linenumbers">
&lt;xd:def xmlns:xd = "http://www.xdef.org/xdef/4.2" xd:name = "Test" xd:root = "Book">
  &lt;Book ISBN="int(10000000, 999999999);"
      year = "gYear();"
      title = "string();"
  >
      &lt;Author xd:script="occurs *"> string(); &lt;/Author>
  &lt;/Book>

  /* All items in the model are in English version */
  &lt;xd:lexicon language='eng' default='yes'/>

  &lt;xd:lexicon language='deu'>
      Test#Book =         Buch
      Test#Book/@year =   Jahr
      Test#Book/@title =  Buchtitel
      Test#Book/Author =  Autor
  &lt;/xd:lexicon>

  &lt;xd:lexicon language='fra'>
      Test#Book =         Livre
      Test#Book/@year =   année
      Test#Book/@title =  titre
      Test#Book/Author =  Auteur
  &lt;/xd:lexicon>
&lt;/xd:def>
</textarea>

<div>
<b>Input data:</b>
</div><div>
Language of data:
<input name="langInp" value="deu" type="text"/>
(language from X-lexicon)
</div>
<textarea name="data" rows="10" class="linenumbers">
&lt;Buch ISBN = "123456789"
      Jahr = "1992"
      Buchtitel = "Snow Crash"
>
  &lt;Autor>Neal Stephenson&lt;/Autor>
&lt;/Buch>
</textarea>

<div>
Output language: <input name="langOut" value="" type="text"/>
(language from X-lexicon or empty to preserve language)
</div><div>
<button type="submit">Validate</button>
</div>

</form>


<div id="footer"><span class="errorVD">ERROR: FOOTER NOT LOADED</span></div>

<script type="module">initPageBasicLnums()</script>

</body>
</html>
